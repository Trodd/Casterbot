# render.yaml - Render Infrastructure as Code Blueprint
# Deploy from GitHub: connect your repo at https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: casterbot
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m casterbot
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: casterbot-db
          property: connectionString
      - key: DISCORD_TOKEN
        sync: false
      - key: GUILD_ID
        value: "1182380144887865406"
      - key: CLAIM_CHANNEL_ID
        value: "1469126063622852650"
      - key: PRIVATE_CATEGORY_ID
        value: "1196103170930258000"
      - key: TRANSCRIPT_CHANNEL_ID
        value: "1478970508556107847"
      - key: TEAM_LOGO_CHANNEL_ID
        value: "1524514228868743432"
      - key: LEAGUE_NAME
        value: Echo Master League
      - key: REQUIRE_CLAIM_ROLE
        value: "false"
      - key: CASTER_ROLE_ID
        value: "1209743670421753946"
      - key: CAMOP_ROLE_ID
        value: "1209746366314586233"
      - key: CASTER_TRAINING_ROLE_ID
        value: "1209744203400093736"
      - key: CAMOP_TRAINING_ROLE_ID
        value: "1470877757268431016"
      - key: STAFF_ROLE_ID
        value: "1182380145084993591"
      - key: LIVE_ANNOUNCEMENT_CHANNEL_ID
        value: "1187175946806099998"
      - key: LIVE_PING_ROLE_ID
        value: "1190072325178142730"
      - key: TWITCH_URL
        value: https://www.twitch.tv/echomasterleague
      - key: TWITCH_URL_2
        value: https://www.twitch.tv/echomasterleague_2
      - key: UPCOMING_MATCHES_CSV_URL
        value: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIvdXGBkVZB5ZFdMVUCZqe8e8DbOj6UbSAeqBP0uzYAY5Z1q37c-ZVG7iV96_cOlX-0jsgNLYXfe6B/pub?gid=881384435&single=true&output=csv"
      - key: RANKINGS_CSV_URL
        value: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIvdXGBkVZB5ZFdMVUCZqe8e8DbOj6UbSAeqBP0uzYAY5Z1q37c-ZVG7iV96_cOlX-0jsgNLYXfe6B/pub?gid=1604124065&single=true&output=csv"
      - key: DISCORD_CLIENT_ID
        value: "1477542037682258050"
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: WEB_LEAD_ROLE_ID
        value: "1482240459035246754"
      - key: RPC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEB_ENABLED
        value: "true"
      - key: WEB_HOST
        value: "0.0.0.0"
      - key: WEB_PORT
        value: "10000"
      - key: WEB_PUBLIC_URL
        value: "https://casterbot.onrender.com"
      - key: MATCH_LOOKAHEAD_DAYS
        value: "14"
      - key: MATCH_GRACE_HOURS
        value: "0"
      - key: SYNC_INTERVAL_SECONDS
        value: "300"
      - key: TIMEZONE
        value: US/Eastern
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER_DISK_PATH
        value: /data
    disk:
      name: casterbot-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: casterbot-db
    plan: basic-256mb
    region: ohio
    databaseName: casterbot
    user: casterbot
