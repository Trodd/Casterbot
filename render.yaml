# render.yaml - Render Infrastructure as Code Blueprint
# Deploy from GitHub: connect your repo at https://dashboard.render.com
# Docs: https://render.com/docs/blueprint-spec
#
# After deploying, set all "sync: false" variables in the Render dashboard.
# See .env.example for descriptions of each variable.

services:
  - type: web
    name: casterbot
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m casterbot
    envVars:
      # -- Database (auto-linked) --
      - key: DATABASE_URL
        fromDatabase:
          name: casterbot-db
          property: connectionString

      # -- Secrets (set manually in Render dashboard) --
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: RPC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # -- Discord IDs (set in Render dashboard for your server) --
      - key: GUILD_ID
        sync: false
      - key: CLAIM_CHANNEL_ID
        sync: false
      - key: PRIVATE_CATEGORY_ID
        sync: false
      - key: TRANSCRIPT_CHANNEL_ID
        sync: false
      - key: TEAM_LOGO_CHANNEL_ID
        sync: false
      - key: CASTER_ROLE_ID
        sync: false
      - key: CAMOP_ROLE_ID
        sync: false
      - key: CASTER_TRAINING_ROLE_ID
        sync: false
      - key: CAMOP_TRAINING_ROLE_ID
        sync: false
      - key: STAFF_ROLE_ID
        sync: false
      - key: LIVE_ANNOUNCEMENT_CHANNEL_ID
        sync: false
      - key: LIVE_PING_ROLE_ID
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: WEB_LEAD_ROLE_ID
        sync: false

      # -- URLs (set in Render dashboard for your league) --
      - key: TWITCH_URL
        sync: false
      - key: TWITCH_URL_2
        sync: false
      - key: UPCOMING_MATCHES_CSV_URL
        sync: false
      - key: RANKINGS_CSV_URL
        sync: false

      # -- Defaults (safe to keep in repo) --
      - key: LEAGUE_NAME
        value: Echo Master League
      - key: REQUIRE_CLAIM_ROLE
        value: "false"
      - key: WEB_ENABLED
        value: "true"
      - key: WEB_HOST
        value: "0.0.0.0"
      - key: WEB_PORT
        value: "10000"
      - key: WEB_PUBLIC_URL
        sync: false
      - key: MATCH_LOOKAHEAD_DAYS
        value: "14"
      - key: MATCH_GRACE_HOURS
        value: "0"
      - key: SYNC_INTERVAL_SECONDS
        value: "300"
      - key: TIMEZONE
        value: US/Eastern
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER_DISK_PATH
        value: /data
    disk:
      name: casterbot-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: casterbot-db
    plan: basic-256mb
    region: ohio
    databaseName: casterbot
    user: casterbot
